<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Love Letter You Truly Asked For 💌</title>
<style>
  body {
    background: linear-gradient(to bottom, #ffd6e0, #fff0f5);
    font-family: 'Dancing Script', cursive;
    text-align: center;
    padding-top: 50px;
  }
  h1 {
    color: #ff4d6d;
    font-size: 32px;
    margin-bottom: 20px;
  }
  .postcard {
    width: 400px;
    height: 260px;
    margin: auto;
    border-radius: 12px;
    background: #fff;
    border: 6px solid #ff809f;
    box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    position: relative;
  }
  .stamp {
    position: absolute;
    top: 15px;
    right: 15px;
    width: 60px;
    height: 60px;
    background: #ffb6c1;
    border: 2px dashed #ff4d6d;
    border-radius: 8px;
    font-size: 20px;
    line-height: 60px;
    color: #fff;
  }
  .seal {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 40px;
    color: #ff4d6d;
  }
  .name {
    position: absolute;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 26px;
    color: #333;
    font-weight: bold;
  }
  .open-btn {
    margin-top: 40px;
    background-color: #ff4d6d;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 25px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
  }
  .open-btn:hover {
    background-color: #ff809f;
  }
</style>
</head>
<body>

<h1>💌 A Love Letter You Truly Asked For 💌</h1>

<div class="postcard">
  <div class="stamp">💖</div>
  <div class="seal">💌</div>
  <div class="name">KEERU</div>
</div>

<button class="open-btn" onclick="window.location.href='letter.html'">Open</button>


<audio id="song" src="Can_I_Call_You_Baby_Female_Version_Pink_Sweats_English_Ringtone_(by_Fringster.com).mp3"></audio>

<script>
function openLetter() {
  let song = document.getElementById('song');
  song.play().then(() => {
    // Wait 1 second before redirect
    setTimeout(() => {
      window.location.href = 'letter.html';
    }, 1000);
  }).catch(err => {
    console.log("Playback failed:", err);
    window.location.href = 'letter.html';
  });
}
</script>


</body>
</html>
